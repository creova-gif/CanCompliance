kind = "web"
previewPath = "/"
title = "CanCompliance"
version = "1.0.0"
id = "artifacts/cancompliance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23686

[services.development]
run = "pnpm --filter @workspace/cancompliance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cancompliance", "run", "build" ]
publicDir = "artifacts/cancompliance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23686"
BASE_PATH = "/"
